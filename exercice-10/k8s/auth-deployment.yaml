apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: fullstack-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
      - name: auth-container
        image: bounat/auth-api:latest
        imagePullPolicy: IfNotPresent #  dit à K8s de regarder en local d'abord

        resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

        # livenessProbe:
