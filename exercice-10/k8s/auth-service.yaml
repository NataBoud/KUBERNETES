apiVersion: v1
kind: Service
metadata:
  name: auth-service # (utilisé par le DNS)
  namespace: fullstack-ns
spec:
  selector:
    app: auth-api # Cible les pods avec le label "app: auth-api"
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80       # Port exposé par le service
      targetPort: 80 # Port du container