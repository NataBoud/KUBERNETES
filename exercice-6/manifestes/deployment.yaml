apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-ip-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-ip
      tier: frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  revisionHistoryLimit: 5

  template:
    metadata:
      name: nginx-ip-pod
      labels:
        app: nginx-ip
        tier: frontend

    spec:
      containers:
      - name: nginx-container
        image: nginxdemos/hello:plain-text
        ports:
          - containerPort: 80
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"