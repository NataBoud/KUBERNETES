apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-usa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-usa
  template:
    metadata:
      labels:
        app: game-usa
    spec:
      tolerations:
      - key: "country"
        operator: "Equal"
        value: "usa"
        effect: "NoExecute"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: country
                operator: In
                values: ["usa"]
      containers:
      - name: game
        image: quchaonet/2048